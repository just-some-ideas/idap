name: IDAP
options:
  bundleIdPrefix: app.idap
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15"

packages:
  IDAPCrypto:
    path: ../packages/idap-crypto
  IDAPIdentity:
    path: ../packages/idap-identity
  IDAPAuth:
    path: ../packages/idap-auth
  IDAPContacts:
    path: ../packages/idap-contacts
  IDAPRecovery:
    path: ../packages/idap-recovery
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "6.0.0"

targets:
  IDAP:
    type: application
    platform: iOS
    sources:
      - path: IDAP
    info:
      path: IDAP/Resources/Info.plist
      properties:
        UILaunchScreen: {}
        NSFaceIDUsageDescription: "IDAP uses Face ID to protect your identity and approve login requests."
        CFBundleURLTypes:
          - CFBundleURLName: IDAP
            CFBundleURLSchemes:
              - idap
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
    settings:
      base:
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        PRODUCT_BUNDLE_IDENTIFIER: app.idap
        CODE_SIGN_ENTITLEMENTS: IDAP/IDAP.entitlements
    dependencies:
      - package: IDAPCrypto
        product: IDAPCrypto
      - package: IDAPIdentity
        product: IDAPIdentity
      - package: IDAPAuth
        product: IDAPAuth
      - package: IDAPContacts
        product: IDAPContacts
      - package: IDAPRecovery
        product: IDAPRecovery
      - package: GRDB
        product: GRDB

  IDAPTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: IDAPTests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: app.idap.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: IDAP
      - package: IDAPCrypto
        product: IDAPCrypto
      - package: IDAPIdentity
        product: IDAPIdentity
      - package: IDAPAuth
        product: IDAPAuth
      - package: IDAPContacts
        product: IDAPContacts
      - package: IDAPRecovery
        product: IDAPRecovery

  IDAPUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: IDAPUITests
    settings:
      base:
        SWIFT_VERSION: "5.9"
        PRODUCT_BUNDLE_IDENTIFIER: app.idap.uitests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: IDAP
